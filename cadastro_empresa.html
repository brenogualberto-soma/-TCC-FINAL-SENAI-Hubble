						<div>

							<br>
							<form method="POST" action="php/cadastro-empresa.php">

								<!-- Etapa 1 -->
								<div class="etapa" id="etapa1">
									<div>
										<label class="label-control" style="color: #ffffff; font-size: 18px;">Razão Social</label><br>
										<input type="text" name="razao_social" class="form popp-font-2 mt-2" maxlength="80" placeholder="Razão Social da empresa" required>
									</div>
									<br>
									<div>
										<label class="label-control" style="color: #ffffff; font-size: 18px;">Nome Fantasia</label><br>
										<input type="text" name="nome_fantasia" class="form popp-font-2 mt-2" maxlength="25" maxplaceholder="Nome Fantasia da empresa" required placeholder="Nome da empresa">
									</div>
									<br>
									<center>
										<button type="button" class="btn btn-lg popp-font button-login btn-dark mt-5" onclick="proximaEtapa(1)">Próximo</button>
									</center>
								</div>
							
								<!-- Etapa 2 -->
								<div class="etapa" id="etapa2" style="display: none;">
									<div>
										<label class="label-control" style="color: #ffffff; font-size: 18px;">CNPJ</label><br>
										<input type="text" name="cnpj" class="form popp-font-2 mt-2" maxlength="18" placeholder="00.000.000/0001-00" required>
									</div>
									<br>
									<div>
										<label class="label-control" style="color: #ffffff; font-size: 18px;">E-mail Corporativo</label><br>
										<input type="email" maxlength="100" name="email" class="form popp-font-2 mt-2" placeholder="empresa@exemplo.com.br" required>
									</div>
									<br>
									<center>
										<div class="d-flex justify-content-around">
											<button type="button" class="btn btn-lg popp-font button-login btn-dark mt-5" onclick="voltarEtapa(2)">Voltar</button>
											<button type="button" class="btn btn-lg popp-font button-login btn-dark mt-5" onclick="proximaEtapa(2)">Próximo</button>
										</div>
									</center>
								</div>
							
								<!-- Etapa 3 -->
								<div class="etapa" id="etapa3" style="display: none;">
									<div>
										<label class="label-control" style="color: #ffffff; font-size: 20px;">Senha</label><br>
										<input type="password" maxlength="255" name="senha" id="senha1" class="form popp-font-2 mt-2" placeholder="Digite sua senha" required oninput="testesenha()">
									</div>
									<br>
									<div>
										<label class="label-control" style="color: #ffffff; font-size: 20px;">Confirmar Senha</label><br>
										<input type="password" name="confirmar_senha" maxlength="255" id="senha2" class="form popp-font-2 mt-2" placeholder="Confirme sua senha" required oninput="testesenha()">

									<br>
									<div id="erroSenha"></div>
									<center>
										<div class="d-flex justify-content-around">

											<button type="button" class="btn btn-lg popp-font button-login btn-dark mt-5" onclick="proximaEtapa(3)">Próximo</button>
										</div>
									</center>
								</div>

											<div id="finalizar">
												<a href="completo_cadastro_empresa.html" class="btn btn-lg popp-font button-login btn-dark mt-5" style="text-decoration: none;">Finalizar Cadastro</a>

		<!-- JS -->
		 <script>

			function proximaEtapa(etapaAtual) {


				document.getElementById('etapa' + etapaAtual).style.display = 'none';
				document.getElementById('etapa' + (etapaAtual + 1)).style.display = 'block'
					
				
			}
			
			function voltarEtapa(etapaAtual) {
				document.getElementById('etapa' + etapaAtual).style.display = 'none';
				document.getElementById('etapa' + (etapaAtual - 1)).style.display = 'block';
			}

			function testesenha(){

				let senha1 = document.getElementById("senha1").value;
				let senha2 = document.getElementById("senha2").value;

				if (senha1 != senha2 ) {
					html = `<p href="#" style="color: #ec5e5e; text-decoration: none; font-size: 23px">Senhas Diferentes!</p>`;
					document.getElementById("erro2").innerHTML = html;
					document.getElementById('finalizar').style.display = 'none';
				}else{
					document.getElementById("erro2").innerHTML = ``;
					document.getElementById('finalizar').style.display = 'block';
				}
	
			}
		 </script>
