<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hubble | Login</title>
	<link rel="icon" type="image/png" sizes="32x32" href="imagens/favicon.ico">
	<!--ESTILO-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
	<link rel="stylesheet" href="estilo_cadastro_login.css">
	<!--JS-->

	</head>
  <body>
	<header class="e-header d-flex justify-content-between align-items-center ">
	  <div class="d-flex justify-content-around align-items-center">
		<img src="imagens/logo.png" class="ms-5" alt="Logo da Hubble" width="55px">
		<h1 class="mol-font m-0 text-white fs-2 ms-2">HUBBLE</h1>
	  </div> 
	  <nav class="d-flex popp-font-2 me-5">
		<a class="nav-link a-1 me-4 popp-font-2 desativado" href="pagina inicial.html">Início</a>
		<a class="nav-link a-1 me-4 popp-font-2 ativo" href="Login.html">Hub</a>
		<a class="nav-link a-1 me-4 popp-font-2 desativado" href="empresas_e_parceiros.html">Empresas e Parceiros</a>
		<a class="nav-link a-1 me-4 popp-font-2 desativado" href="Sobre_nos.html">Sobre Nós</a>
	</nav>
	</header>
	<main>
	  <div class="row d-flex justify-content-center" style="width: 100%;">
		<div class="col">
		  <div class="d-flex popp-font-2 d-flex justify-content-center ps-5" style="background-color: #1a1a1a; width: 900px; padding: 74px 20px; padding-bottom: 100%;">
			<div>
			  <center>
				<h1 class="pt-3" style="color: white; font-weight: normal; font-size: 17px;">Não tem uma conta?<a href="cadastro(base).html" class="ms-3" style="color: #ff66c4; text-decoration: underline;">Cadastre - se aqui!</a></h1>
				<img src="imagens/icone_login.png" class="mt-5" alt=" imagem de networking" height="300px">
				<h2 class="text-white " style="font-size: 46px; font-weight:600;">Faça login na Hubble</h2>
			  </center>
			  <br>
			  <form style="color: white;">
				<div>
				  <label class="label-control" style="color: #ffffff; font-size: 18px;">E-mail</label>
				  <input type="text" class="form popp-font-2 mt-2" id="email">
				</div>
				<br>
				<div>
				  <label class="label-control" style="color: #ffffff; font-size: 18px;">Senha</label><br>
				  <input type="password" class="form popp-font-2 mt-2" id="senha">
				</div>
				<a href="#" class="esquec-senha" style="font-size: 13px">Esqueci minha senha</a>
				<br>
				<center>
				  <button onclick="TesteLogin(event)" class="btn btn-lg popp-font button-login mt-5">Fazer login</button>
				</center>
			  </form>
			</div>
		  </div>	
		</div>
		<div class="col">
		  <div class="d-flex align-items-center" style="margin-left: 160px; margin-top: 410px;">
			<img src="imagens/logo.png" class="ms-5" alt="Logo da Hubble" width="200px">
			<h1 class="mol-font m-0 text-white ms-2" style="font-size: 100px">HUBBLE</h1>
		  </div> 
		</div>
		</div>
	  </div>			
	</main>
	<!-- JS -->
	<script>
	  function TesteLogin(event) {
		event.preventDefault();
		const email = document.getElementById('email').value;
		const senha = document.getElementById('senha').value;
		const email_empresa = 'empresa@gmail.com';
		const senha_empresa = 'asdfg123';
		const email_usuario = 'usuario@gmail.com';
		const senha_usuario = 'asdfg456';
		if (email === email_empresa && senha === senha_empresa) {
		  window.location.href = "Hub_empresa.html";
		} else if (email === email_usuario && senha === senha_usuario) {
		  window.location.href = "Hub.html";
		} else {
		  alert("Email ou senha incorretos!");
		}
	  }
	</script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
  </body>
</html>
